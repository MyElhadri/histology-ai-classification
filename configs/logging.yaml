# ============================================================
# Logging Configuration
# ============================================================

version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

  detailed:
    format: "%(asctime)s | %(levelname)-8s | %(name)s:%(funcName)s:%(lineno)d | %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

  brief:
    format: "%(levelname)-8s | %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: detailed
    filename: experiments/runs/app.log
    maxBytes: 10485760  # 10 MB
    backupCount: 5
    encoding: utf-8

  error_file:
    class: logging.handlers.RotatingFileHandler
    level: ERROR
    formatter: detailed
    filename: experiments/runs/error.log
    maxBytes: 10485760
    backupCount: 3
    encoding: utf-8

loggers:
  src.data:
    level: DEBUG
    handlers: [console, file]
    propagate: false

  src.models:
    level: DEBUG
    handlers: [console, file]
    propagate: false

  src.training:
    level: INFO
    handlers: [console, file]
    propagate: false

  src.evaluation:
    level: INFO
    handlers: [console, file]
    propagate: false

root:
  level: INFO
  handlers: [console, file, error_file]
