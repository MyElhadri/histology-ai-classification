# ============================================================
# Histology AI Classification — Configuration
# ============================================================
# Copy this file to config.yaml and adjust values.
# Do NOT commit config.yaml (it is gitignored).
# ============================================================

# -----------------------------------------------------------
# Project Metadata
# -----------------------------------------------------------
project:
  name: "histology-ai-classification"
  version: "0.1.0"
  description: "Histological tissue classification using deep learning"
  seed: 42

# -----------------------------------------------------------
# Data Configuration
# -----------------------------------------------------------
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  augmented_dir: "data/augmented"

  image_size: [224, 224]
  color_mode: "rgb"          # rgb | grayscale
  validation_split: 0.15
  test_split: 0.15
  shuffle: true

# -----------------------------------------------------------
# Preprocessing
# -----------------------------------------------------------
preprocessing:
  normalization: "imagenet"  # imagenet | minmax | standard
  stain_normalization: false
  resize_interpolation: "bilinear"

# -----------------------------------------------------------
# Augmentation
# -----------------------------------------------------------
augmentation:
  enabled: true
  horizontal_flip: true
  vertical_flip: true
  rotation_range: 30
  zoom_range: 0.15
  brightness_range: [0.8, 1.2]
  contrast_range: [0.8, 1.2]
  fill_mode: "reflect"

# -----------------------------------------------------------
# Model Configuration
# -----------------------------------------------------------
model:
  # Architecture: densenet121 | resnet50v2 | ensemble
  architecture: "densenet121"
  pretrained: true
  weights: "imagenet"
  freeze_base: true
  unfreeze_at_epoch: 10

  # Classification head
  dropout_rate: 0.5
  dense_units: 256
  num_classes: null           # auto-detected from dataset

# -----------------------------------------------------------
# Training Configuration
# -----------------------------------------------------------
training:
  batch_size: 32
  epochs: 100
  optimizer: "adam"
  learning_rate: 0.001
  lr_scheduler: "reduce_on_plateau"
  lr_patience: 5
  lr_factor: 0.5
  min_lr: 0.000001

  loss: "categorical_crossentropy"
  metrics:
    - "accuracy"
    - "precision"
    - "recall"
    - "f1_score"

# -----------------------------------------------------------
# Callbacks
# -----------------------------------------------------------
callbacks:
  early_stopping:
    enabled: true
    monitor: "val_loss"
    patience: 15
    restore_best_weights: true

  model_checkpoint:
    enabled: true
    monitor: "val_accuracy"
    save_best_only: true
    save_dir: "models/checkpoints"

  tensorboard:
    enabled: true
    log_dir: "experiments/runs"

  csv_logger:
    enabled: true
    output_dir: "reports/metrics"

# -----------------------------------------------------------
# Evaluation
# -----------------------------------------------------------
evaluation:
  confusion_matrix: true
  classification_report: true
  roc_curve: true
  grad_cam: true
  output_dir: "reports/figures"

# -----------------------------------------------------------
# Paths
# -----------------------------------------------------------
paths:
  models_dir: "models/saved"
  checkpoints_dir: "models/checkpoints"
  exports_dir: "models/exports"
  logs_dir: "experiments/runs"
  reports_dir: "reports"
  figures_dir: "reports/figures"

# -----------------------------------------------------------
# Hardware
# -----------------------------------------------------------
hardware:
  gpu_enabled: true
  mixed_precision: false
  num_workers: 4
  prefetch_buffer: 2
