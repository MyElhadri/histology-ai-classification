# ============================================================
# ResNet50V2 Configuration — Mabena
# ============================================================
# This configuration extends configs/common.yaml with
# ResNet50V2-specific training parameters.
#
# ⚠ TO BE VALIDATED BY MABENA
# These are initial placeholder values. Mabena is free to
# adjust all training parameters and choose her own
# validation strategy (holdout, k-fold, etc.).
#
# What is fixed (from common.yaml):
#   - Test set (20%, same split as DenseNet121)
#   - Class mapping (same 22 classes)
#   - Evaluation metrics
#
# What Mabena can freely choose:
#   - Validation strategy and split method
#   - All training hyperparameters below
#   - Fine-tuning approach
# ============================================================

model:
  architecture: ResNet50V2
  weights: imagenet
  input_shape: [224, 224, 3]
  dropout_rate: 0.30          # TODO: Mabena — adjust as needed
  dense_units: 256            # TODO: Mabena — adjust as needed

training:
  environment: to_be_defined  # TODO: Mabena — local GPU / Colab / other
  batch_size: 16              # TODO: Mabena — adjust as needed
  head_epochs: 10             # TODO: Mabena — adjust as needed
  fine_tuning_epochs: 40      # TODO: Mabena — adjust as needed
  head_learning_rate: 0.001   # TODO: Mabena — adjust as needed
  fine_tuning_learning_rate: 0.00001  # TODO: Mabena — adjust as needed
  optimizer: adamw            # TODO: Mabena — adjust as needed
  early_stopping_patience: 8  # TODO: Mabena — adjust as needed
  reduce_lr_patience: 3       # TODO: Mabena — adjust as needed
  resume_from_checkpoint: true

validation:
  strategy: to_be_defined     # TODO: Mabena — choose: holdout / kfold / other
  # Mabena defines her own validation split or fold structure.
  # The only constraint is using the shared test set from common.yaml.
