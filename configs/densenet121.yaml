# ============================================================
# DenseNet121 Configuration — Yassine
# ============================================================
# This configuration extends configs/common.yaml with
# DenseNet121-specific training parameters.
#
# Validation strategy: 5-fold stratified cross-validation
# on the development set (80% of data).
# ============================================================

model:
  architecture: DenseNet121
  weights: imagenet
  input_shape: [224, 224, 3]
  dropout_rate: 0.30
  dense_units: 256

training:
  environment: google_colab
  batch_size: 16
  head_epochs: 10
  fine_tuning_epochs: 40
  head_learning_rate: 0.001
  fine_tuning_learning_rate: 0.00001
  optimizer: adamw
  early_stopping_patience: 8
  reduce_lr_patience: 3
  resume_from_checkpoint: true

validation:
  strategy: stratified_kfold
  num_folds: 5
  folds_manifest_path: data/manifests/densenet121_folds.csv
